name: Release & Publish

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Read package version
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "new_version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.new_version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ---- Create Release Tag & Asset ----
      - name: Create git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Build release artifact
        if: steps.check_tag.outputs.exists == 'false'
        id: pack
        run: |
          npm pack
          echo "tarball=$(ls ./*.tgz | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          awk '/^## \[/{c++} c==1{print} c==2{exit}' CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: ${{ steps.pack.outputs.tarball }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Publish to npm ----
      - name: Publish to npm
        if: steps.check_tag.outputs.exists == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
